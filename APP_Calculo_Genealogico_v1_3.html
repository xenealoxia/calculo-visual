<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cálculo Genealógico v1.3</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@400;500&family=Dancing+Script:wght@400&display=swap" rel="stylesheet">

<style>

*{
  box-sizing: border-box;
}

body{
  margin:0;
  font-family:'Cinzel', serif;
  background:#000;
  display:flex;
  justify-content:center;
  padding:20px;
}

.parchment{
  background:#b59a53;
  width:100%;
  max-width:420px;
  padding:25px 20px 40px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.8);
}

h1{
  text-align:center;
  margin-bottom:25px;
  font-weight:700;
  letter-spacing:2px;
}

#clearBtn{
  display:block;
  margin:0 auto 25px;
  width:90px;
  height:90px;
  border-radius:50%;
  border:none;
  background:#ffc0cb;
  font-family:'Roboto', sans-serif;
}

.container{
  display:grid;
  grid-template-columns: 1fr auto 20px auto 1fr;
  align-items:center;
}

.block{
  width:100%;
  text-align:center;
}

.block.year{
  grid-column:2;
}

.block.age{
  grid-column:4;
}

label{
  display:block;
  text-align:center;
  font-size:12px;
  margin-bottom:5px;
}

input{
  width:100%;
  padding:10px;
  font-size:18px;
  text-align:center;
  border-radius:10px;
  border:1px solid #333;
  font-family:'Roboto', sans-serif;
  box-shadow:2px 2px 5px rgba(0,0,0,0.3);
}

.result{
  margin-top:25px;
  text-align:center;
}

#output{
  margin-top:10px;
  padding:12px 25px;
  background:#eee;
  color:#2e7d32;
  border-radius:10px;
  font-size:20px;
  font-family:'Roboto', sans-serif;
  box-shadow:2px 2px 5px rgba(0,0,0,0.3);
  display:inline-block;
}

#calcBtn{
  display:block;
  margin:25px auto 0;
  width:90px;
  height:90px;
  border-radius:50%;
  border:none;
  background:#2e7d32;
  color:white;
  font-family:'Roboto', sans-serif;
}

.footer{
  margin-top:40px;
  text-align:center;
  font-family:'Dancing Script', cursive;
  font-size:18px;
  color:#2e7d32;
}

.footer:after{
  content:"";
  display:block;
  width:120px;
  height:1px;
  background:#2e7d32;
  margin:5px auto 0;
  transform:rotate(-2deg);
}

</style>
</head>

<body>

<div class="parchment">

<h1>CÁLCULO GENEALÓGICO</h1>

<button id="clearBtn" onclick="borrar()">BORRAR</button>

<div class="container">

  <div class="block year">
    <label>AÑO DE REGISTRO</label>
    <input id="year" type="text" placeholder="AÑO">
  </div>

  <div class="block age">
    <label>EDAD DEL INDIVIDUO</label>
    <input id="age" type="text" placeholder="EDAD">
  </div>

</div>

<div class="result">
  <label>INTERVALO DE NACIMIENTO</label>
  <div id="output">NACIDO ENTRE</div>
</div>

<button id="calcBtn" onclick="calcular()">CALCULAR</button>

<div class="footer">LISISTRATA v 1.3</div>

</div>

<script>

function esNumeroValido(valor){
  return /^[0-9]+$/.test(valor);
}

function calcular(){
  let yearInput = document.getElementById('year').value.trim();
  let ageInput = document.getElementById('age').value.trim();

  if(!esNumeroValido(yearInput) || !esNumeroValido(ageInput)){
    alert("DATOS NO VALIDABLES");
    return;
  }

  let A = parseInt(yearInput);
  let E = parseInt(ageInput);

  let min = A - E - 1;
  let max = A - E;

  document.getElementById('output').innerText = min + " - " + max;
}

function borrar(){
  document.getElementById('year').value = "";
  document.getElementById('age').value = "";
  document.getElementById('output').innerText = "NACIDO ENTRE";
}

</script>

</body>
</html>
